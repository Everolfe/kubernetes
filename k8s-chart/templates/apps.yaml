# --- Auth Service ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-auth-service
spec:
  replicas: {{ .Values.authService.replicaCount }}
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: {{ .Values.authService.image }}
          imagePullPolicy: {{ .Values.appConfig.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.authService.port }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "{{ .Values.global.springProfile }}"
            - name: APP_PORT
              value: "{{ .Values.authService.port }}"
            - name: D_USER_URL
              value: "http://{{ .Release.Name }}-user-service:{{ .Values.userService.port }}"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Release.Name }}-postgres-auth:5432/{{ .Values.postgresql.auth.dbName }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.postgresql.auth.user }}
            - name: REDIS_HOST
              value: "{{ .Release.Name }}-auth-redis"
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: AUTH_DB_PASSWORD
            - name: USER_APP_PORT
              value: "{{ .Values.userService.port }}"
          livenessProbe:
            httpGet:
              path: {{ .Values.appConfig.livenessPath }}
              port: {{ .Values.authService.port }}
            initialDelaySeconds: {{ .Values.appConfig.initialDelaySeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.appConfig.readinessPath }}
              port: {{ .Values.authService.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: {{ .Values.authService.port }}

---
# --- User Service ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-user-service
spec:
  replicas: {{ .Values.userService.replicaCount }}
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: {{ .Values.userService.image }}
          imagePullPolicy: {{ .Values.appConfig.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.userService.port }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secrets
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "{{ .Values.global.springProfile }}"
            - name: APP_PORT
              value: "{{ .Values.userService.port }}"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: "http://{{ .Release.Name }}-auth-service:{{ .Values.authService.port }}/api/auth/.well-known/jwks.json"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Release.Name }}-postgres-user:5432/{{ .Values.postgresql.user.dbName }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.postgresql.user.user }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: USER_DB_PASSWORD
            - name: AUTH_APP_PORT
              value: "{{ .Values.authService.port }}"
            - name: REDIS_HOST
              value: "{{ .Release.Name }}-user-redis"
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
          livenessProbe:
            httpGet:
              path: {{ .Values.appConfig.livenessPath }}
              port: {{ .Values.userService.port }}
            initialDelaySeconds: {{ .Values.appConfig.initialDelaySeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.appConfig.readinessPath }}
              port: {{ .Values.userService.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-user-service
spec:
  selector:
    app: user-service
  ports:
    - port: {{ .Values.userService.port }}

