# --- Postgres Auth ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-postgres-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-auth
  template:
    metadata:
      labels:
        app: postgres-auth
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: {{ .Values.postgresql.port }}
          env:
            - name: POSTGRES_HOST_AUTH_METHOD
              value: "trust"
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.dbName }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: AUTH_DB_PASSWORD
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U {{ .Values.postgresql.auth.user }} -d {{ .Values.postgresql.auth.dbName }}"
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U {{ .Values.postgresql.auth.user }} -d {{ .Values.postgresql.auth.dbName }}"
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-auth-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-auth-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-postgres-auth-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres-auth
spec:
  selector:
    app: postgres-auth
  ports:
    - port: {{ .Values.postgresql.port }}

